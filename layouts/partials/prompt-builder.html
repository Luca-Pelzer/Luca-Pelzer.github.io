<div id="prompt-builder-widget">
    <div id="pb-toggle" class="fixed bottom-6 right-3 sm:right-6 z-50 group cursor-pointer">
        <div class="flex items-center">
            <span id="pb-label" class="mr-2 px-3 py-2 bg-gray-800 text-white text-sm rounded-lg opacity-0 group-hover:opacity-100 transition-opacity duration-200 whitespace-nowrap">
                Prompt Builder
            </span>
            <button class="w-14 h-14 bg-gray-800 hover:bg-gray-700 text-white rounded-full shadow-lg flex items-center justify-center transition-all duration-300 border border-gray-600">
                <svg id="pb-icon-open" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <svg id="pb-icon-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Panel -->
    <div id="pb-panel" class="fixed bottom-24 right-3 sm:right-6 w-[calc(100vw-3rem)] sm:w-96 max-h-[70vh] bg-bg-primary-light dark:bg-bg-secondary-dark border border-border-primary-light dark:border-border-primary-dark rounded-lg shadow-2xl z-50 hidden flex-col overflow-hidden">
        <!-- Header -->
        <div class="px-4 py-3 border-b border-border-primary-light dark:border-border-primary-dark flex items-center justify-between">
            <h3 class="font-bold text-text-primary-light dark:text-text-primary-dark">Prompt Builder</h3>
            <button id="pb-back" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 hidden">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </button>
        </div>

        <!-- Content -->
        <div id="pb-content" class="flex-grow overflow-y-auto p-4">
            <!-- Step 1: Categories -->
            <div id="pb-step-categories">
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-3">Select a category</p>
                <div id="pb-categories" class="space-y-2"></div>
            </div>

            <!-- Step 2: Prompts -->
            <div id="pb-step-prompts" class="hidden">
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-3">Select a prompt</p>
                <div id="pb-prompts" class="space-y-2"></div>
            </div>

            <!-- Step 3: Variables -->
            <div id="pb-step-variables" class="hidden">
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-3">Fill in the details</p>
                <div id="pb-variables" class="space-y-4"></div>
                <button id="pb-generate" class="w-full mt-4 px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded transition-colors">
                    Generate Prompt
                </button>
            </div>

            <!-- Step 4: Result -->
            <div id="pb-step-result" class="hidden">
                <div class="flex items-center justify-between mb-3">
                    <p class="text-sm text-gray-500 dark:text-gray-400">Your prompt is ready</p>
                    <button id="pb-copy" class="text-sm px-3 py-1 bg-gray-700 hover:bg-gray-600 text-white rounded transition-colors flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                        </svg>
                        <span>Copy</span>
                    </button>
                </div>
                <pre id="pb-result" class="bg-gray-100 dark:bg-gray-800 p-3 rounded text-sm text-gray-700 dark:text-gray-300 overflow-x-auto whitespace-pre-wrap max-h-80 overflow-y-auto"></pre>
                <button id="pb-new" class="w-full mt-4 px-4 py-2 border border-gray-600 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 rounded transition-colors">
                    Build Another
                </button>
            </div>
        </div>
    </div>
</div>

    var currentCategory = null;
    var currentPrompt = null;
    var currentContent = null;
    var currentVariables = [];

    var toggle = document.getElementById('pb-toggle');
    var panel = document.getElementById('pb-panel');
    var iconOpen = document.getElementById('pb-icon-open');
    var iconClose = document.getElementById('pb-icon-close');
    var backBtn = document.getElementById('pb-back');
    var categoriesContainer = document.getElementById('pb-categories');
    var promptsContainer = document.getElementById('pb-prompts');
    var variablesContainer = document.getElementById('pb-variables');
    var resultContainer = document.getElementById('pb-result');

    var stepCategories = document.getElementById('pb-step-categories');
    var stepPrompts = document.getElementById('pb-step-prompts');
    var stepVariables = document.getElementById('pb-step-variables');
    var stepResult = document.getElementById('pb-step-result');

    function showStep(step) {
        [stepCategories, stepPrompts, stepVariables, stepResult].forEach(function(s) { s.classList.add('hidden'); });
        step.classList.remove('hidden');
        backBtn.classList.toggle('hidden', step === stepCategories);
    }

    toggle.addEventListener('click', function() {
        var isOpen = !panel.classList.contains('hidden');
        panel.classList.toggle('hidden', isOpen);
        panel.classList.toggle('flex', !isOpen);
        iconOpen.classList.toggle('hidden', !isOpen);
        iconClose.classList.toggle('hidden', isOpen);
        if (!isOpen) reset();
    });

    backBtn.addEventListener('click', function() {
        if (!stepPrompts.classList.contains('hidden')) {
            showStep(stepCategories);
        } else if (!stepVariables.classList.contains('hidden')) {
            renderPrompts(currentCategory);
            showStep(stepPrompts);
        } else if (!stepResult.classList.contains('hidden')) {
            showStep(stepVariables);
        }
    });

    function reset() {
        currentCategory = null;
        currentPrompt = null;
        currentContent = null;
        currentVariables = [];
        showStep(stepCategories);
    }

    function renderCategories() {
        categoriesContainer.innerHTML = categories.map(function(cat) {
            return '<button class="w-full text-left px-3 py-2 rounded hover:bg-gray-100 dark:hover:bg-gray-800 flex items-center gap-3 text-text-primary-light dark:text-text-primary-dark transition-colors" data-category="' + cat.id + '">' +
                '<span class="text-gray-500 dark:text-gray-400">' + categoryIcons[cat.id] + '</span>' +
                '<span>' + cat.name + '</span>' +
            '</button>';
        }).join('');

        categoriesContainer.querySelectorAll('button').forEach(function(btn) {
            btn.addEventListener('click', function() { selectCategory(btn.dataset.category); });
        });
    }

    function selectCategory(catId) {
        currentCategory = catId;
        renderPrompts(catId);
        showStep(stepPrompts);
    }

    function renderPrompts(catId) {
        var list = prompts[catId] || [];
        promptsContainer.innerHTML = list.map(function(p) {
            return '<button class="w-full text-left px-3 py-2 rounded hover:bg-gray-100 dark:hover:bg-gray-800 text-text-primary-light dark:text-text-primary-dark text-sm transition-colors" data-file="' + p.file + '">' +
                p.name +
            '</button>';
        }).join('');

        promptsContainer.querySelectorAll('button').forEach(function(btn) {
            btn.addEventListener('click', function() { selectPrompt(btn.dataset.file); });
        });
    }

    function selectPrompt(file) {
        currentPrompt = file;
        var url = GITHUB_RAW + '/' + currentCategory + '/' + file;
        
        promptsContainer.innerHTML = '<p class="text-center text-gray-500">Loading...</p>';
        fetch(url)
            .then(function(res) {
                if (!res.ok) throw new Error('Failed to fetch');
                return res.text();
            })
            .then(function(text) {
                currentContent = text;
                var matches = currentContent.match(/\{\{([^}]+)\}\}/g) || [];
                var seen = {};
                currentVariables = [];
                matches.forEach(function(m) {
                    var v = m.slice(2, -2).trim();
                    if (!seen[v]) {
                        seen[v] = true;
                        currentVariables.push(v);
                    }
                });
                renderVariables();
                showStep(stepVariables);
            })
            .catch(function() {
                promptsContainer.innerHTML = '<p class="text-center text-red-500">Failed to load prompt</p>';
            });
    }

    function renderVariables() {
        if (currentVariables.length === 0) {
            variablesContainer.innerHTML = '<p class="text-gray-500 text-sm">This prompt has no variables to fill in.</p>';
        } else {
            variablesContainer.innerHTML = currentVariables.map(function(v) {
                return '<div>' +
                    '<label class="block text-sm font-medium text-text-primary-light dark:text-text-primary-dark mb-1">' + formatLabel(v) + '</label>' +
                    '<textarea class="w-full px-3 py-2 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded text-sm text-text-primary-light dark:text-text-primary-dark resize-y min-h-[60px]" data-var="' + v + '" placeholder="Enter ' + formatLabel(v).toLowerCase() + '..."></textarea>' +
                '</div>';
            }).join('');
        }
    }

    function formatLabel(varName) {
        return varName.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
    }

    document.getElementById('pb-generate').addEventListener('click', function() {
        var result = currentContent;
        result = result.replace(/^---[\s\S]*?---\n*/m, '');
        
        variablesContainer.querySelectorAll('textarea').forEach(function(ta) {
            var varName = ta.dataset.var;
            var value = ta.value || '[' + varName + ']';
            result = result.replace(new RegExp('\\{\\{\\s*' + varName + '\\s*\\}\\}', 'g'), value);
        });

        resultContainer.textContent = result.trim();
        showStep(stepResult);
    });

    document.getElementById('pb-copy').addEventListener('click', function() {
        var btn = document.getElementById('pb-copy');
        navigator.clipboard.writeText(resultContainer.textContent)
            .then(function() {
                btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg><span>Copied!</span>';
                setTimeout(function() {
                    btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg><span>Copy</span>';
                }, 2000);
            })
            .catch(function() {
                btn.innerHTML = '<span>Failed</span>';
            });
    });

    document.getElementById('pb-new').addEventListener('click', reset);

    renderCategories();
})();
