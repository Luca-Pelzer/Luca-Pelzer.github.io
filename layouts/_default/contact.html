{{ define "main" }}
<div class="max-w-4xl mx-auto px-4 py-12">
    <h1 class="text-5xl font-bold mb-6 text-text-primary-light dark:text-text-primary-dark">{{ .Title }}</h1>
    <div class="bg-bg-primary-light dark:bg-bg-secondary-dark p-8 rounded-lg border border-border-primary-light dark:border-border-primary-dark">
        <div class="prose prose-lg max-w-none contact-content">
            <div class="text-text-secondary-light dark:text-text-secondary-dark text-lg mb-8">
                {{ .Content }}
            </div>
            
            <div class="border border-border-primary-light dark:border-border-primary-dark rounded-lg p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- GitHub -->
                    <a href="{{ .Site.Params.github }}" target="_blank" class="contact-link flex items-center gap-4 p-4 rounded-lg bg-bg-primary-light dark:bg-bg-secondary-dark transition-all duration-300">
                        <svg class="w-7 h-7 text-text-secondary-light dark:text-text-secondary-dark shrink-0" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                        <div class="min-w-0">
                            <div class="text-text-secondary-light dark:text-text-secondary-dark hover:text-text-primary-light dark:hover:text-text-primary-dark transition-colors duration-300 truncate">GitHub</div>
                            <div class="text-sm text-text-tertiary-light dark:text-text-tertiary-dark truncate">{{ .Site.Params.github_username }}</div>
                        </div>
                    </a>

                    <!-- Discord -->
                    <a href="https://discord.com/users/{{ .Site.Params.discord }}" target="_blank" class="contact-link flex items-center gap-4 p-4 rounded-lg bg-bg-primary-light dark:bg-bg-secondary-dark transition-all duration-300">
                        <svg class="w-7 h-7 text-text-secondary-light dark:text-text-secondary-dark shrink-0" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0a12.64 12.64 0 0 0-.617-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028a14.09 14.09 0 0 0 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128a10.2 10.2 0 0 0 .372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127a12.299 12.299 0 0 1-1.873.892a.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028a19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.956-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.946 2.418-2.157 2.418z"/>
                        </svg>
                        <div class="min-w-0">
                            <div class="text-text-secondary-light dark:text-text-secondary-dark hover:text-text-primary-light dark:hover:text-text-primary-dark transition-colors duration-300 truncate">Discord</div>
                            <div class="text-sm text-text-tertiary-light dark:text-text-tertiary-dark truncate">engels.</div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .prose {
        color: #4b5563;
    }
    html.dark .prose {
        color: #9ca3af;
    }
    .prose p {
        color: #4b5563;
        margin-bottom: 1.5rem;
        line-height: 1.9;
    }
    .contact-content strong {
        color: #111827;
        font-weight: 600;
    }
    html.dark .contact-content strong {
        color: #ffffff;
    }
    .contact-content h2, .contact-content h3 {
        color: #111827;
    }
    html.dark .contact-content h2, html.dark .contact-content h3 {
        color: #ffffff;
    }
    html.dark .prose p {
        color: #9ca3af;
    }
    
    /* Links in contact content - match surrounding text, no underline */
    .contact-content a {
        text-decoration: none;
        color: #1f2937;
    }
    .contact-content a:hover {
        opacity: 0.7;
    }
    html.dark .contact-content a {
        color: #f3f4f6;
    }
    
    .contact-link {
        position: relative;
        overflow: hidden;
        border: 1px solid #d1d5db;
        text-decoration: none;
    }
    html.dark .contact-link {
        border: 1px solid #4b5563;
    }
    
    .contact-link:hover {
        border-color: #9ca3af;
        transform: translateY(-2px);
    }
    html.dark .contact-link:hover {
        border-color: #6b7280;
    }
    
    @media (max-width: 768px) {
        .contact-link {
            width: 100%;
        }
    }
    .contact-content h2:first-child {
        margin-top: 0;
    }
</style>
{{ end }}
