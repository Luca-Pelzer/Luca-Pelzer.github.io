baseURL = "https://engelswtf.github.io"
title = "Luca Pelzer"
theme = "hugo-noir"

# URL handling
relativeURLs = false
canonifyURLs = true

# Multi-language configuration
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    weight = 1
    [languages.en.params]
      name = "Luca Pelzer"
      profile_image = "/images/profile.png"
      description = "Luca Pelzer's personal site. Exploring, building & running AI infrastructure - from agents to self-hosted models."
      location = "Germany"
      github = "https://github.com/engelswtf"
      github_username = "engelswtf"
      discord = "262327058317836300"
    [languages.en.menu]
      [[languages.en.menu.main]]
        name = "About"
        pageRef = "/about"
        weight = 1
