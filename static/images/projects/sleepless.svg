<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#0f172a"/>
  <rect x="50" y="50" width="700" height="350" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  
  <!-- Moon icon -->
  <circle cx="180" cy="200" r="60" fill="#334155"/>
  <circle cx="210" cy="180" r="50" fill="#1e293b"/>
  
  <!-- Stars -->
  <circle cx="120" cy="130" r="3" fill="#94a3b8"/>
  <circle cx="250" cy="110" r="2" fill="#94a3b8"/>
  <circle cx="140" cy="280" r="2" fill="#94a3b8"/>
  
  <!-- Task queue -->
  <rect x="320" y="100" width="380" height="50" rx="5" fill="#334155" stroke="#22c55e" stroke-width="2"/>
  <rect x="320" y="170" width="380" height="50" rx="5" fill="#334155" stroke="#eab308" stroke-width="2"/>
  <rect x="320" y="240" width="380" height="50" rx="5" fill="#334155" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Status indicators -->
  <circle cx="350" cy="125" r="8" fill="#22c55e"/>
  <circle cx="350" cy="195" r="8" fill="#eab308"/>
  <circle cx="350" cy="265" r="8" fill="#94a3b8"/>
  
  <!-- Task labels -->
  <text x="380" y="130" fill="#94a3b8" font-family="sans-serif" font-size="14">Running: Deploy updates...</text>
  <text x="380" y="200" fill="#94a3b8" font-family="sans-serif" font-size="14">Queued: Review PR #42...</text>
  <text x="380" y="270" fill="#94a3b8" font-family="sans-serif" font-size="14">Pending: Generate docs...</text>
  
  <!-- Title -->
  <text x="420" y="340" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="18">24/7 AI Task Queue</text>
</svg>
