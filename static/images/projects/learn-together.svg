<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Cards icon -->
  <rect x="80" y="80" width="80" height="100" rx="8" fill="#2d3748" stroke="url(#accent)" stroke-width="2"/>
  <rect x="95" y="95" width="80" height="100" rx="8" fill="#374151" stroke="url(#accent)" stroke-width="2"/>
  <rect x="110" y="110" width="80" height="100" rx="8" fill="#4b5563" stroke="url(#accent)" stroke-width="2"/>
  <!-- Question mark -->
  <text x="150" y="175" font-family="Arial, sans-serif" font-size="40" fill="url(#accent)" text-anchor="middle">?</text>
  <!-- Multiplayer icons -->
  <circle cx="280" cy="120" r="25" fill="#374151" stroke="url(#accent)" stroke-width="2"/>
  <circle cx="320" cy="160" r="25" fill="#374151" stroke="url(#accent)" stroke-width="2"/>
  <circle cx="280" cy="200" r="25" fill="#374151" stroke="url(#accent)" stroke-width="2"/>
  <!-- Connection lines -->
  <line x1="280" y1="145" x2="295" y2="160" stroke="url(#accent)" stroke-width="2"/>
  <line x1="295" y1="160" x2="280" y2="175" stroke="url(#accent)" stroke-width="2"/>
  <!-- Title -->
  <text x="200" y="260" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">LearnTogether</text>
  <text x="200" y="285" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Multiplayer Exam Prep</text>
</svg>
