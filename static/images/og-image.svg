    <path d="M-320 0 L-280 35 L-320 70" stroke="#e5e7eb" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M-265 70 L-210 70" stroke="#e5e7eb" stroke-width="12" stroke-linecap="round"/>
    
    <!-- engels.wtf text -->
    <text x="80" y="60" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="#ffffff" text-anchor="middle">engels.wtf</text>
  </g>
  
  <!-- Tagline -->
