projects:
  - title: "Sleepless OpenCode"
    description: "A 24/7 background task daemon for OpenCode that processes AI tasks while you're away. Queue tasks via Discord bot or MCP tools, get notified when complete."
    tech: "TypeScript, Discord.js, SQLite, OpenCode MCP"
    image: "/images/projects/sleepless.svg"
    link: "https://github.com/engelswtf/sleepless-opencode"

  - title: "LearnTogether"
    description: "A real-time multiplayer learning platform for German IT exam preparation (IHK Fachinformatiker) with 5 game modes including flashcards, quizzes, duels, races, and realistic exam simulation."
    tech: "Next.js, TypeScript, Socket.io, Tailwind CSS"
    image: "/images/projects/learn-together.svg"
    link: "https://github.com/engelswtf/learn-together"
    
  - title: "EngelGuard"
    description: "A professional-grade Twitch moderation bot featuring auto-mod capabilities, custom commands, loyalty system, and a web dashboard for stream management."
    tech: "Python, Twitch API, Web Dashboard"
    image: "/images/projects/engelguard.svg"
    link: "https://github.com/engelswtf/engelguard"
    
  - title: "Proxmox Homelab Infrastructure"
    description: "A comprehensive homelab setup running Proxmox VE with multiple LXC containers and VMs for various self-hosted services including monitoring, automation, and media management."
    tech: "Proxmox, LXC, Docker, Shorewall, Caddy"
    image: "/images/projects/homelab.svg"
    link: "https://github.com/engelswtf"
    
  - title: "Hugo Blog Platform"
    description: "A self-hosted blog built with Hugo and a custom dark theme, featuring a web-based markdown editor and automatic site rebuilds on content changes."
    tech: "Hugo, Caddy, Docker, Markdown"
    image: "/images/projects/blog.svg"
    link: "https://engelswtf.github.io"
