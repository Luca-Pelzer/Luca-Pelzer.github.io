projects:
  - title: "Sleepless OpenCode"
    description: "Ein 24/7 Hintergrund-Task-Daemon für OpenCode, der KI-Aufgaben verarbeitet während du weg bist. Aufgaben via Discord-Bot oder MCP-Tools einreihen, Benachrichtigung bei Fertigstellung."
    tech: "TypeScript, Discord.js, SQLite, OpenCode MCP"
    image: "/images/projects/sleepless.svg"
    link: "https://github.com/engelswtf/sleepless-opencode"

  - title: "LearnTogether"
    description: "Eine Echtzeit-Multiplayer-Lernplattform für die IHK-Prüfungsvorbereitung (Fachinformatiker) mit 5 Spielmodi: Karteikarten, Quiz, Duell, Rennen und realistische Prüfungssimulation."
    tech: "Next.js, TypeScript, Socket.io, Tailwind CSS"
    image: "/images/projects/learn-together.svg"
    link: "https://github.com/engelswtf/learn-together"
    
  - title: "EngelGuard"
    description: "Ein professioneller Twitch-Moderationsbot mit Auto-Mod-Funktionen, benutzerdefinierten Befehlen, Treuepunktsystem und Web-Dashboard für Stream-Management."
    tech: "Python, Twitch API, Web Dashboard"
    image: "/images/projects/engelguard.svg"
    link: "https://github.com/engelswtf/engelguard"
    
  - title: "Proxmox Homelab Infrastruktur"
    description: "Ein umfassendes Homelab-Setup mit Proxmox VE, mehreren LXC-Containern und VMs für verschiedene selbst gehostete Dienste wie Monitoring, Automatisierung und Medienverwaltung."
    tech: "Proxmox, LXC, Docker, Shorewall, Caddy"
    image: "/images/projects/homelab.svg"
    link: "https://github.com/engelswtf"
    
  - title: "Hugo Blog Plattform"
    description: "Ein selbst gehosteter Blog mit Hugo und einem benutzerdefinierten Dark Theme, mit webbasiertem Markdown-Editor und automatischen Site-Rebuilds bei Inhaltsänderungen."
    tech: "Hugo, Caddy, Docker, Markdown"
    image: "/images/projects/blog.svg"
    link: "https://engelswtf.github.io"
